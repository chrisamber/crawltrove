name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security tools
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: ruff check app/crawl app/acquisition app/artifacts eval scripts/check_migration_compat.py
      - name: Mypy
        run: >-
          mypy --follow-imports=skip --explicit-package-bases
          app/crawl/types.py app/crawl/config.py
          app/acquisition/providers.py app/acquisition/registry.py
          app/acquisition/sessions.py app/artifacts/base.py
          app/worker_config.py scripts/check_migration_compat.py
      - name: Bandit
        run: >-
          bandit -q -lll -r app/crawl app/acquisition app/artifacts eval
          scripts/check_migration_compat.py -x tests
      - name: Dependency audit
        run: pip-audit --strict -r requirements.txt

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python, javascript-typescript
      - uses: github/codeql-action/analyze@v4

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install cyclonedx-bom==7.2.0
      - run: cyclonedx-py requirements requirements.txt --output-file sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json
          if-no-files-found: error

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build --tag crawltrove:security --target core .
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: crawltrove:security
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
