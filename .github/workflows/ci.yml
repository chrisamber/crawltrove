name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_PG_ADMIN_DSN: postgresql://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crawltrove_test
      REQUIRE_TEST_DATABASE: "true"

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/app/pnpm-lock.yaml

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install dashboard dependencies
        working-directory: apps/app
        run: pnpm install --frozen-lockfile

      - name: Run dashboard tests
        working-directory: apps/app
        run: pnpm test

      - name: Type-check dashboard
        working-directory: apps/app
        run: pnpm check

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Run tests
        run: python -m pytest -q

      - name: Build core and remote worker images
        run: docker compose build crawltrove worker-init worker-standard worker-browser

      - name: Verify artifact migration command
        run: |
          mkdir -p "$RUNNER_TEMP/crawltrove-migration"
          printf 'migration-ok\n' > "$RUNNER_TEMP/crawltrove-migration/check.txt"
          docker compose run --rm --no-deps \
            -v "$RUNNER_TEMP/crawltrove-migration:/migration-source:ro" \
            crawltrove sh -c 'cp -R /migration-source/. /workspace/data/'
          docker compose run --rm --no-deps \
            crawltrove test -f /workspace/data/check.txt

      - name: Start supported Docker runtime
        run: docker compose up -d --wait --wait-timeout 120

      - name: Verify running containers, API, and dashboard
        run: |
          docker compose ps --status running
          curl --fail --show-error --silent http://127.0.0.1:8000/api/health |
            python -c 'import json, sys; health = json.load(sys.stdin); assert health["status"] == "healthy" and health["service"] == "crawltrove" and health["db"] == "up", health; print(json.dumps(health))'
          python - <<'PY'
          import re
          import urllib.request

          base = "http://127.0.0.1:8000"
          html = urllib.request.urlopen(base, timeout=5).read().decode("utf-8")
          match = re.search(r'(?:src|href)="([^"]*/static/dashboard/_next/[^"]+)"', html)
          assert match, "root did not serve the Next.js dashboard"
          asset = urllib.request.urlopen(base + match.group(1), timeout=5)
          assert asset.status == 200, asset.status
          print(match.group(1))
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop supported Docker runtime
        if: always()
        run: docker compose down --volumes

  provider-smoke:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: provider-release
    concurrency:
      group: provider-release-smoke
      cancel-in-progress: false
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      BRIGHTDATA_UNLOCKER_ZONE: ${{ secrets.BRIGHTDATA_UNLOCKER_ZONE }}
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ARTIFACT_STORE_BACKEND: s3
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run one-call managed provider smoke
        run: python scripts/smoke_providers.py
