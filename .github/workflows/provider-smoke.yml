name: Protected provider smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-release-smoke
  cancel-in-progress: false

jobs:
  provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: provider-release
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      BRIGHTDATA_UNLOCKER_ZONE: ${{ secrets.BRIGHTDATA_UNLOCKER_ZONE }}
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ARTIFACT_STORE_BACKEND: s3
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run one-call managed provider smoke
        run: python scripts/smoke_providers.py
